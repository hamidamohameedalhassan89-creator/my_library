<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبتي الالكترونية</title>
<style>
body {font-family: Tahoma; background: #f4f1ea; margin: 0; padding: 15px;}
h1 {text-align: center; color: #5d4037;}
.container {max-width: 700px; margin: auto;}
#search {width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #5d4037; border-radius: 8px; font-size: 16px;}
.book {background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 2px 5px #ccc; display: flex; gap: 15px; cursor: pointer;}
.book:hover {background: #fff8f0;}
.book img {width: 80px; height: 120px; border-radius: 5px;}
#details {display: none; background: white; padding: 20px; border-radius: 10px; line-height: 1.8;}
#details img {width: 150px; display: block; margin: 0 auto 15px; border-radius: 5px;}
.back-btn {background: #5d4037; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; display: none;}
</style>
</head>
<body>

<div class="container">
<h1>📚 مكتبتي الالكترونية</h1>
<input type="text" id="search" placeholder="ابحث عن اسم كتاب او كاتب..." onkeyup="searchBooks()">
<button class="back-btn" id="backBtn" onclick="showList()">← رجوع</button>
<div id="books-list"></div>
<div id="details"></div>
</div>

<script>
let books = [
{
name: "الخيميائي",
author: "باولو كويلو",
desc: "رحلة البحث عن الكنز ومعنى الحياة",
full: `ملخص: سانتياغو راعي شاب يحلم بكنز في مصر. يبيع غنمه ويسافر. يتعلم من الخيميائي ان "الكون يتآمر لمساعدتك". في النهاية يكتشف ان الكنز في بيته القديم. الرسالة: اتبع حلمك.`,
img: "https://images-na.ssl-images-amazon.com/images/I/71aFt4+OTOL.jpg"
},
{
name: "في قلبي انثى عبرية",
author: "خولة حمدي",
desc: "قصة حب وايمان وتحدي",
full: `ملخص: ندى فتاة يهودية تبحث عن الحق. تتأثر باحمد المسلم وتسلم رغم طرد اهلها لها. قصة عن التضحية والايمان في زمن الحرب. الرسالة: الدين معاملة.`,
img: "https://images-na.ssl-images-amazon.com/images/I/81eB+7+CkL.jpg"
},
{
name: "ارض زيكولا",
author: "عمرو عبد الحميد",
desc: "مدينة تتعامل بوحدات الذكاء",
full: `ملخص: خالد يصل مدينة زيكولا اللي ما فيها قروش. الناس بتشتري بالذكاء. لازم يهرب قبل "يوم زيكولا" اللي بقتلو فيه اغبى 3. الرسالة: العقل هو الثروة.`,
img: "https://images-na.ssl-images-amazon.com/images/I/91+VvKZbK-L.jpg"
},
{
name: "موسم الهجرة الى الشمال",
author: "الطيب صالح",
desc: "رواية سودانية عالمية",
full: `ملخص: الراوي يرجع السودان بعد الدراسة في اوروبا. يقابل مصطفى سعيد الغامض اللي درس في لندن وقتل زوجتين. الرواية بتحكي عن صراع الشرق والغرب والهوية. من اعظم الروايات العربية.`,
img: "https://via.placeholder.com/150/5d4037/fff?text=موسم+الهجرة"
},
{
name: "انت لي",
author: "منى المرشود",
desc: "رواية رومانسية سعودية مشهورة",
full: `ملخص: قصة حب بين وليد و رغد من الطفولة. فرقتهم الظروف 10 سنين. لما رجع وليد لقاها اتغيرت. هل حيرجعو لبعض؟ رواية عن العشق والقدر والتحديات العائلية.`,
img: "https://via.placeholder.com/150/8B0000/fff?text=انت+لي"
},
{
name: "احببتك اكثر مما ينبغي",
author: "اثير النشمي",
desc: "قصة حب ووجع",
full: `ملخص: جود بنت تحب عزيز حب مجنون. هو يخونها ويكذب ويتعبها لكنها ما قادرة تتركه. الرواية بتحكي عن التعلق والحب المؤذي ومتين لازم نقول كفاية. وجعت قلوب كتير.`,
img: "https://via.placeholder.com/150/800080/fff?text=احببتك"
},
{
name: "سلسلة ما وراء الطبيعة",
author: "احمد خالد توفيق",
desc: "رعب وغموض واثارة",
full: `ملخص: الدكتور رفعت اسماعيل طبيب امراض دم متشائم وعنده لعنة. كل مغامرة بيدخل في قضية رعب: بيت مسكون، مصاصين دماء، لعنة فرعونية. لو بتحب الرعب دي سلسلتك.`,
img: "https://via.placeholder.com/150/000/fff?text=ما+وراء"
},
{
name: "قواعد العشق الاربعون",
author: "اليف شافاق",
desc: "جلال الدين الرومي وشمس التبريزي",
full: `ملخص: قصتين متوازيات. قصة عزيز في الزمن الحالي اللي بلقى مخطوطة. وقصة جلال الدين الرومي مع شمس التبريزي. 40 قاعدة بتغير نظرتك للحب والله والحياة. عميقة جدا.`,
img: "https://via.placeholder.com/150/DAA520/000?text=قواعد+العشق"
},
{
name: "الاسود يليق بك",
author: "احلام مستغانمي",
desc: "حب بين رجل اعمال و فنانة",
full: `ملخص: رجل اعمال جزائري غني يقع في حب فنانة شابة بعد ما ابوها اتقتل. بحاول يسعدها بكل الطرق لكن الاسود يليق بيها عشان الحزن. رواية عن الحب والفقد والكبرياء.`,
img: "https://via.placeholder.com/150/000/fff?text=الاسود"
},
{
name: "مذكرات طالب",
author: "جيف كيني",
desc: "كوميدي للمراهقين",
full: `ملخص: جريج فتى في المدرسة المتوسطة. بيسجل يومياته بالصور والكلام عن مواقفه المحرجة مع اخوانه واصحابه والمعلمين. مضحكة وخفيفة وتخليك تضحك من قلبك.`,
img: "https://via.placeholder.com/150/FFD700/000?text=مذكرات+طالب"
}
];

let booksListDiv = document.getElementById('books-list');
let detailsDiv = document.getElementById('details');
let backBtn = document.getElementById('backBtn');

function showList() {detailsDiv.style.display = 'none'; booksListDiv.style.display = 'block'; backBtn.style.display = 'none';}
function showBook(i) {let b = books[i]; detailsDiv.innerHTML = `<img src="${b.img}"><h2>${b.name}</h2><p><b>الكاتب:</b> ${b.author}</p><hr><p style="white-space: pre-line;">${b.full}</p>`; detailsDiv.style.display = 'block'; booksListDiv.style.display = 'none'; backBtn.style.display = 'inline-block';}
function displayBooks(bookArray) {booksListDiv.innerHTML = ''; bookArray.forEach((book, i) => {let realIndex = books.indexOf(book); booksListDiv.innerHTML += `<div class="book" onclick="showBook(${realIndex})"><img src="${book.img}"><div><h3>${book.name}</h3><p>الكاتب: ${book.author}</p><p>${book.desc}</p></div></div>`;});}
function searchBooks() {let searchValue = document.getElementById('search').value.toLowerCase(); let filteredBooks = books.filter(book => book.name.toLowerCase().includes(searchValue) || book.author.toLowerCase().includes(searchValue)); displayBooks(filteredBooks);}
displayBooks(books);
</script>

</body>
</html>
